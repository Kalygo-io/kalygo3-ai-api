name: Build and Deploy to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: kalygo-436411 # Google Cloud project id
  GAR_LOCATION: us-central1 # Artifact Registry location
  SERVICE_NAME: kalygo-fastapi-service # Cloud Run service name
  SERVICE_REGION: us-east1 # Cloud Run service region
  ARTIFACTORY_URL: us-central1-docker.pkg.dev/kalygo-436411/kalygo-fastapi/kalygo-fastapi

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kalygo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          POSTGRES_TEST_URL: postgresql://test:test@localhost:5432/kalygo_test
        run: uv run pytest -x -q

  deploy:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Google Cloud Auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"
          project_id: ${{ env.PROJECT_ID }}

      # BEGIN - Docker auth and build

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -f Dockerfile.prod -t "${{ env.ARTIFACTORY_URL }}:${{ github.sha }}" ./
          docker push "${{ env.ARTIFACTORY_URL }}:${{ github.sha }}"

      # END - Docker auth and build

      - name: Replace Cloud Run Service
        run: gcloud run services replace service.yaml --region $SERVICE_REGION

      - name: Deploy to Cloud Run
        run: |
          echo SERVICE_NAME $SERVICE_NAME
          gcloud run deploy $SERVICE_NAME \
            --image ${{ env.ARTIFACTORY_URL }}:${{ github.sha }} \
            --platform managed \
            --region $SERVICE_REGION \
            --allow-unauthenticated

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
